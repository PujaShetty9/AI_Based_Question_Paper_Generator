name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      run: cd frontend && npm ci
    
    - name: Lint code
      run: cd frontend && npm run lint || true
      continue-on-error: true
    
    - name: Build
      run: cd frontend && npm run build
    
    - name: Check build output
      run: |
        if [ -d "frontend/dist" ]; then
          echo "Build successful! Output in frontend/dist"
          ls -la frontend/dist
        else
          echo "Build failed - dist folder not found"
          exit 1
        fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    # Uncomment and configure based on your deployment platform
    
    # For Vercel deployment:
    # - name: Deploy to Vercel
    #   uses: vercel/action@master
    #   with:
    #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
    #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
    #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
    #     working-directory: ./frontend
    
    # For Netlify deployment:
    # - name: Build and Deploy to Netlify
    #   uses: nwtgck/actions-netlify@v2.0
    #   with:
    #     publish-dir: './frontend/dist'
    #     production-branch: main
    #     github-token: ${{ secrets.GITHUB_TOKEN }}
    #     deploy-message: "Deploy from GitHub Actions"
    #     enable-pull-request-comment: true
    #     enable-commit-comment: true
    #   env:
    #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
    #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    
    # For GitHub Pages deployment:
    # - name: Deploy to GitHub Pages
    #   uses: peaceiris/actions-gh-pages@v3
    #   with:
    #     github_token: ${{ secrets.GITHUB_TOKEN }}
    #     publish_dir: ./frontend/dist
    
    - name: Build and prepare frontend
      run: |
        cd frontend
        npm ci
        npm run build
        echo "Frontend ready for deployment"
        echo "Configure deployment in .github/workflows/frontend.yml based on your platform"
